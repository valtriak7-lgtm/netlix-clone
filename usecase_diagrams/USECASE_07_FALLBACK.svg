<line x1="700" y1="225" x2="700" y2="285" class="ln"/><line x1="650" y1="350" x2="500" y2="440" class="ln"/><line x1="750" y1="350" x2="900" y2="440" class="ln"/>
<line x1="430" y1="505" x2="430" y2="605" class="ln"/><line x1="530" y1="640" x2="810" y2="640" class="ln"/><line x1="980" y1="505" x2="980" y2="605" class="ln"/>
