<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<style>.t{font:700 30px Arial}.l{font:16px Arial}.u{fill:#fff;stroke:#333;stroke-width:2}.b{fill:#f9f9f9;stroke:#444;stroke-width:2}.ln{stroke:#555;stroke-width:2}</style>
<text x="450" y="45" class="t">Use Case 07 - Fallback / Resilience</text>
<rect x="260" y="90" width="900" height="740" rx="10" class="b"/><text x="590" y="120" class="l">Fallback Module</text>
<ellipse cx="700" cy="190" rx="170" ry="35" class="u"/><text x="612" y="196" class="l">Request Movie Data</text>
<ellipse cx="700" cy="320" rx="150" ry="35" class="u"/><text x="635" y="326" class="l">Try TMDB API</text>
