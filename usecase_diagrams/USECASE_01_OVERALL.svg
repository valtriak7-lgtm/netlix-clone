<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #111; }
      .label { font: 16px Arial, sans-serif; fill: #111; }
      .small { font: 14px Arial, sans-serif; fill: #222; }
      .actor { stroke: #222; stroke-width: 2; fill: none; }
      .system { fill: #fbfbfb; stroke: #444; stroke-width: 2; }
      .usecase { fill: #fff; stroke: #333; stroke-width: 2; }
      .line { stroke: #555; stroke-width: 2; }
    </style>
  </defs>

  <text x="560" y="45" class="title">Netflix Clone - Use Case Diagram</text>

  <!-- System boundary -->
  <rect x="290" y="85" width="1010" height="830" rx="10" class="system"/>
  <text x="700" y="115" class="label">Netflix Clone System</text>

  <!-- Actors Left -->
  <!-- Guest -->
  <circle cx="120" cy="170" r="18" class="actor"/>
  <line x1="120" y1="188" x2="120" y2="245" class="actor"/>
  <line x1="90" y1="210" x2="150" y2="210" class="actor"/>
  <line x1="120" y1="245" x2="95" y2="285" class="actor"/>
  <line x1="120" y1="245" x2="145" y2="285" class="actor"/>
  <text x="95" y="315" class="small">Guest</text>

  <!-- User -->
  <circle cx="120" cy="400" r="18" class="actor"/>
  <line x1="120" y1="418" x2="120" y2="475" class="actor"/>
  <line x1="90" y1="440" x2="150" y2="440" class="actor"/>
  <line x1="120" y1="475" x2="95" y2="515" class="actor"/>
  <line x1="120" y1="475" x2="145" y2="515" class="actor"/>
  <text x="102" y="545" class="small">User</text>

  <!-- Admin -->
  <circle cx="120" cy="640" r="18" class="actor"/>
  <line x1="120" y1="658" x2="120" y2="715" class="actor"/>
  <line x1="90" y1="680" x2="150" y2="680" class="actor"/>
  <line x1="120" y1="715" x2="95" y2="755" class="actor"/>
  <line x1="120" y1="715" x2="145" y2="755" class="actor"/>
  <text x="97" y="785" class="small">Admin</text>

  <!-- Superadmin -->
  <circle cx="120" cy="840" r="18" class="actor"/>
  <line x1="120" y1="858" x2="120" y2="905" class="actor"/>
  <line x1="90" y1="878" x2="150" y2="878" class="actor"/>
  <line x1="120" y1="905" x2="95" y2="940" class="actor"/>
  <line x1="120" y1="905" x2="145" y2="940" class="actor"/>
  <text x="78" y="968" class="small">Superadmin</text>

  <!-- External Actors Right -->
  <!-- TMDB API -->
  <circle cx="1450" cy="250" r="18" class="actor"/>
  <line x1="1450" y1="268" x2="1450" y2="325" class="actor"/>
  <line x1="1420" y1="290" x2="1480" y2="290" class="actor"/>
  <line x1="1450" y1="325" x2="1425" y2="365" class="actor"/>
  <line x1="1450" y1="325" x2="1475" y2="365" class="actor"/>
  <text x="1412" y="395" class="small">TMDB API</text>

  <!-- Razorpay API -->
  <circle cx="1450" cy="620" r="18" class="actor"/>
  <line x1="1450" y1="638" x2="1450" y2="695" class="actor"/>
  <line x1="1420" y1="660" x2="1480" y2="660" class="actor"/>
  <line x1="1450" y1="695" x2="1425" y2="735" class="actor"/>
  <line x1="1450" y1="695" x2="1475" y2="735" class="actor"/>
  <text x="1401" y="765" class="small">Razorpay API</text>

  <!-- Use cases -->
  <ellipse cx="460" cy="180" rx="120" ry="32" class="usecase"/><text x="418" y="186" class="label">Register</text>
  <ellipse cx="680" cy="180" rx="120" ry="32" class="usecase"/><text x="652" y="186" class="label">Login</text>
  <ellipse cx="460" cy="290" rx="145" ry="32" class="usecase"/><text x="384" y="296" class="label">Browse Content</text>
  <ellipse cx="760" cy="290" rx="165" ry="32" class="usecase"/><text x="673" y="296" class="label">Search / Filter / Sort</text>
  <ellipse cx="1060" cy="290" rx="130" ry="32" class="usecase"/><text x="992" y="296" class="label">Watch Trailer</text>

  <ellipse cx="460" cy="430" rx="125" ry="32" class="usecase"/><text x="394" y="436" class="label">Manage My List</text>
  <ellipse cx="760" cy="430" rx="155" ry="32" class="usecase"/><text x="677" y="436" class="label">Update Profile/Settings</text>
  <ellipse cx="1060" cy="430" rx="150" ry="32" class="usecase"/><text x="984" y="436" class="label">Change Password</text>

  <ellipse cx="560" cy="575" rx="165" ry="32" class="usecase"/><text x="467" y="581" class="label">Choose Subscription Plan</text>
  <ellipse cx="900" cy="575" rx="145" ry="32" class="usecase"/><text x="825" y="581" class="label">Create Payment Order</text>
  <ellipse cx="1130" cy="575" rx="145" ry="32" class="usecase"/><text x="1050" y="581" class="label">Verify Payment</text>

  <ellipse cx="520" cy="735" rx="150" ry="32" class="usecase"/><text x="451" y="741" class="label">List Users</text>
  <ellipse cx="840" cy="735" rx="180" ry="32" class="usecase"/><text x="739" y="741" class="label">Update User Subscription</text>
  <ellipse cx="1080" cy="735" rx="145" ry="32" class="usecase"/><text x="1010" y="741" class="label">Update User Role</text>
  <ellipse cx="1080" cy="835" rx="125" ry="32" class="usecase"/><text x="1020" y="841" class="label">Delete User</text>

  <!-- Actor to use case lines -->
  <line x1="150" y1="210" x2="340" y2="180" class="line"/>
  <line x1="150" y1="210" x2="560" y2="180" class="line"/>

  <line x1="150" y1="440" x2="315" y2="290" class="line"/>
  <line x1="150" y1="440" x2="595" y2="290" class="line"/>
  <line x1="150" y1="440" x2="930" y2="290" class="line"/>
  <line x1="150" y1="440" x2="335" y2="430" class="line"/>
  <line x1="150" y1="440" x2="605" y2="430" class="line"/>
  <line x1="150" y1="440" x2="910" y2="430" class="line"/>
  <line x1="150" y1="440" x2="395" y2="575" class="line"/>

  <line x1="150" y1="680" x2="370" y2="735" class="line"/>
  <line x1="150" y1="680" x2="660" y2="735" class="line"/>

  <line x1="150" y1="878" x2="370" y2="735" class="line"/>
  <line x1="150" y1="878" x2="660" y2="735" class="line"/>
  <line x1="150" y1="878" x2="935" y2="735" class="line"/>
  <line x1="150" y1="878" x2="955" y2="835" class="line"/>

  <!-- External actors -->
  <line x1="1430" y1="290" x2="1190" y2="290" class="line"/>
  <line x1="1430" y1="290" x2="1200" y2="575" class="line"/>
  <line x1="1430" y1="660" x2="1045" y2="575" class="line"/>
  <line x1="1430" y1="660" x2="1275" y2="575" class="line"/>

  <!-- include-like flow hints -->
  <line x1="725" y1="575" x2="755" y2="575" class="line"/>
  <line x1="1045" y1="575" x2="985" y2="575" class="line"/>
  <text x="736" y="562" class="small">includes</text>
  <text x="996" y="562" class="small">includes</text>
</svg>
